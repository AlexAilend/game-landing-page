<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Reports | Eclipse Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: "#050612",
            neonCyan: "#42F8FF",
            neonPink: "#FF4FD8",
            neonViolet: "#8B5CFF"
          },
          boxShadow: {
            neon: "0 0 25px rgba(66,248,255,.45), 0 0 70px rgba(255,79,216,.22)",
            softGlow: "0 0 45px rgba(139,92,255,.25)"
          }
        }
      }
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      color: white;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 79, 216, .18), transparent 34%),
        radial-gradient(circle at 85% 15%, rgba(66, 248, 255, .14), transparent 34%),
        radial-gradient(circle at 50% 85%, rgba(139, 92, 255, .22), transparent 38%),
        linear-gradient(135deg, #050612 0%, #080a1a 45%, #0c0616 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -5;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, black 0%, transparent 92%);
    }
    .glass {
      background: linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      border: 1px solid rgba(255,255,255,.13);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 24px 90px rgba(0,0,0,.38);
    }
    .neon-text {
      background: linear-gradient(90deg, #42f8ff, #ff4fd8, #8b5cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <header class="sticky top-0 z-50 border-b border-white/10 bg-void/65 backdrop-blur-xl">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 lg:px-8">
      <a href="index.html" class="text-sm font-black uppercase tracking-[.28em] text-white">Eclipse Portal</a>
      <div class="flex items-center gap-4 text-sm font-bold text-white/70">
        <a href="index.html" class="hover:text-neonCyan">Home</a>
        <a href="agent-report.html" class="hover:text-neonCyan">Local Agent Console</a>
        <a href="downloads/System_Diagnostics_Agent_Upload.ps1" download="System_Diagnostics_Agent_Upload.ps1" class="rounded-full border border-cyan-300/30 bg-cyan-300/10 px-4 py-2 text-neonCyan hover:bg-cyan-300/20">Download Upload Agent</a>
      </div>
    </nav>
  </header>

  <main class="px-5 py-10 lg:px-8">
    <section class="mx-auto max-w-7xl">
      <div class="glass rounded-[2rem] p-7 md:p-10">
        <p class="text-sm font-black uppercase tracking-[.35em] text-neonCyan">Supabase Reports</p>
        <h1 class="mt-4 text-5xl font-black tracking-tight sm:text-7xl">Admin <span class="neon-text">Dashboard</span></h1>
        <p class="mt-5 max-w-3xl text-lg leading-8 text-white/65">
          Shows reports uploaded by the visible diagnostics agent. Enter your admin key from Vercel environment variable <code class="rounded bg-white/10 px-2 py-1 text-neonCyan">REPORTS_ADMIN_KEY</code>.
        </p>
        <div class="mt-7 grid gap-4 lg:grid-cols-[1fr_auto]">
          <input id="adminKey" type="password" placeholder="Admin key" class="rounded-2xl border border-white/10 bg-black/30 px-5 py-4 text-white outline-none focus:border-cyan-300/50" />
          <button id="loadButton" class="rounded-2xl border border-cyan-300/30 bg-cyan-300/10 px-7 py-4 font-black uppercase tracking-[.16em] text-neonCyan hover:bg-cyan-300/20">Load Reports</button>
        </div>
        <p id="status" class="mt-5 rounded-2xl border border-white/10 bg-white/5 p-4 text-sm text-white/65">Waiting for admin key.</p>
      </div>
    </section>

    <section class="mx-auto mt-8 grid max-w-7xl gap-6 lg:grid-cols-[.9fr_1.1fr]">
      <div class="glass rounded-[2rem] p-6">
        <h2 class="text-2xl font-black">Devices</h2>
        <div id="reportList" class="mt-5 grid gap-4"></div>
      </div>
      <div class="glass rounded-[2rem] p-6">
        <h2 class="text-2xl font-black">Selected Report</h2>
        <div id="summary" class="mt-5 grid gap-4"></div>
        <pre id="raw" class="mt-5 max-h-[620px] overflow-auto rounded-2xl border border-white/10 bg-black/35 p-5 text-xs leading-6 text-cyan-100">{}</pre>
      </div>
    </section>
  </main>

  <script>
    const adminKeyInput = document.getElementById("adminKey");
    const loadButton = document.getElementById("loadButton");
    const statusBox = document.getElementById("status");
    const reportList = document.getElementById("reportList");
    const summary = document.getElementById("summary");
    const raw = document.getElementById("raw");

    function escapeHTML(value) {
      return String(value ?? "Unknown")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function smallCard(label, value) {
      return `
        <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
          <p class="text-xs font-black uppercase tracking-[.22em] text-white/40">${escapeHTML(label)}</p>
          <p class="mt-2 break-words text-lg font-black text-white">${escapeHTML(value)}</p>
        </div>
      `;
    }

    async function loadReports() {
      const key = adminKeyInput.value.trim();
      if (!key) {
        statusBox.textContent = "Enter admin key first.";
        return;
      }

      statusBox.textContent = "Loading reports...";
      reportList.innerHTML = "";
      summary.innerHTML = "";
      raw.textContent = "{}";

      try {
        const response = await fetch(`/api/reports?key=${encodeURIComponent(key)}`, { cache: "no-store" });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Failed to load reports.");
        }

        statusBox.textContent = `Loaded ${data.reports.length} report(s).`;

        if (!data.reports.length) {
          reportList.innerHTML = `<p class="rounded-2xl border border-white/10 bg-white/5 p-4 text-white/60">No reports yet. Run the upload agent first.</p>`;
          return;
        }

        reportList.innerHTML = data.reports.map((item, index) => `
          <button class="report-button rounded-2xl border border-white/10 bg-white/5 p-4 text-left transition hover:border-cyan-300/40 hover:bg-cyan-300/10" data-index="${index}">
            <p class="font-black text-white">${escapeHTML(item.computer_name || "Unknown PC")}</p>
            <p class="mt-1 text-sm text-white/55">${escapeHTML(item.os_caption || "Unknown OS")}</p>
            <p class="mt-1 text-xs text-neonCyan">${escapeHTML(item.public_ip || "No IP")} · ${escapeHTML(item.created_at)}</p>
          </button>
        `).join("");

        document.querySelectorAll(".report-button").forEach(button => {
          button.addEventListener("click", () => showReport(data.reports[Number(button.dataset.index)]));
        });

        showReport(data.reports[0]);
      } catch (error) {
        statusBox.textContent = error.message;
      }
    }

    function showReport(item) {
      const report = item.report || {};
      const cpu = Array.isArray(report.processor) ? report.processor[0] || {} : {};
      summary.innerHTML = [
        smallCard("Computer", report.system?.computerName),
        smallCard("OS", report.operatingSystem?.caption),
        smallCard("CPU", cpu.name),
        smallCard("RAM", `${report.hardware?.totalMemoryGB ?? "Unknown"} GB`),
        smallCard("Public IP", report.network?.publicIp),
        smallCard("GPU", report.graphics?.[0]?.Name || report.graphics?.[0]?.name),
        smallCard("Admin", report.system?.isAdministrator),
        smallCard("Report Time", report.metadata?.generatedAtUtc)
      ].join("");
      raw.textContent = JSON.stringify(report, null, 2);
    }

    loadButton.addEventListener("click", loadReports);
    adminKeyInput.addEventListener("keydown", event => {
      if (event.key === "Enter") loadReports();
    });
  </script>
</body>
</html>
