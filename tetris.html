<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Tetris | Eclipse Portal</title>
  <meta name="description" content="Neon Tetris mini-game for Eclipse Portal." />

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void: "#050612",
            neonCyan: "#42F8FF",
            neonPink: "#FF4FD8",
            neonViolet: "#8B5CFF"
          },
          boxShadow: {
            neon: "0 0 25px rgba(66,248,255,.45), 0 0 70px rgba(255,79,216,.22)",
            softGlow: "0 0 45px rgba(139,92,255,.25)"
          }
        }
      }
    };
  </script>

  <style>
    :root {
      --neon-cyan: #42f8ff;
      --neon-pink: #ff4fd8;
      --neon-violet: #8b5cff;
      --border-soft: rgba(255, 255, 255, 0.13);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: white;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 79, 216, .18), transparent 34%),
        radial-gradient(circle at 85% 15%, rgba(66, 248, 255, .14), transparent 34%),
        radial-gradient(circle at 50% 85%, rgba(139, 92, 255, .22), transparent 38%),
        linear-gradient(135deg, #050612 0%, #080a1a 45%, #0c0616 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -5;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, black 0%, transparent 92%);
    }

    .aurora {
      position: fixed;
      inset: -20%;
      z-index: -4;
      pointer-events: none;
      background: conic-gradient(from 120deg, transparent, rgba(66,248,255,.18), transparent, rgba(255,79,216,.16), transparent, rgba(139,92,255,.2), transparent);
      filter: blur(85px);
      animation: auroraFlow 18s ease-in-out infinite alternate;
    }

    @keyframes auroraFlow {
      from { transform: rotate(0deg) scale(1); opacity: .55; }
      to { transform: rotate(18deg) scale(1.12); opacity: .9; }
    }

    .glass {
      background: linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 24px 90px rgba(0,0,0,.38);
    }

    .neon-text {
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    canvas {
      image-rendering: pixelated;
      background: rgba(0,0,0,.45);
    }

    .glow-button {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      box-shadow: 0 0 28px rgba(66,248,255,.42), 0 0 80px rgba(255,79,216,.28), inset 0 0 18px rgba(255,255,255,.18);
    }

    .glow-button::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background: linear-gradient(120deg, #42f8ff, #8b5cff, #ff4fd8, #42f8ff);
      background-size: 250% 250%;
      animation: buttonGradient 4s ease infinite;
    }

    @keyframes buttonGradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .touch-button {
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
  </style>
</head>

<body>
  <div class="aurora"></div>

  <header class="sticky top-0 z-50 border-b border-white/10 bg-void/65 backdrop-blur-xl">
    <nav class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 lg:px-8">
      <a href="index.html" class="flex items-center gap-3">
        <span class="flex h-10 w-10 items-center justify-center rounded-xl border border-cyan-300/30 bg-white/10 shadow-neon">
          <span class="h-3 w-3 rounded-full bg-neonCyan shadow-[0_0_18px_rgba(66,248,255,.9)]"></span>
        </span>
        <span class="text-sm font-black uppercase tracking-[.28em] text-white">Eclipse Portal</span>
      </a>

      <div class="flex items-center gap-4 text-sm font-bold text-white/70">
        <a href="index.html" class="transition hover:text-neonCyan">Home</a>
        <a href="agent-report.html" class="transition hover:text-neonCyan">Agent</a>
        <a href="diagnostics.html" class="transition hover:text-neonCyan">Diagnostics</a>
      </div>
    </nav>
  </header>

  <main class="px-5 py-10 lg:px-8">
    <section class="mx-auto max-w-7xl">
      <div class="glass rounded-[2rem] p-7 md:p-10">
        <p class="text-sm font-black uppercase tracking-[.35em] text-neonPink">Retro Mini Game</p>
        <h1 class="mt-4 text-5xl font-black tracking-tight sm:text-7xl">
          Neon <span class="neon-text">Tetris</span>
        </h1>
        <p class="mt-5 max-w-3xl text-lg leading-8 text-white/65">
          Classic Tetris in the same cyber/neon style. Use keyboard controls or mobile buttons.
        </p>
      </div>
    </section>

    <section class="mx-auto mt-8 grid max-w-7xl gap-6 lg:grid-cols-[auto_1fr]">
      <div class="glass rounded-[2rem] p-5">
        <canvas id="board" width="300" height="600" class="rounded-2xl border border-cyan-300/30 shadow-neon"></canvas>
      </div>

      <aside class="grid gap-6 lg:grid-rows-[auto_auto_1fr]">
        <div class="glass rounded-[2rem] p-6">
          <div class="grid gap-4 sm:grid-cols-3">
            <div class="rounded-2xl border border-white/10 bg-white/5 p-5">
              <p class="text-xs font-black uppercase tracking-[.22em] text-white/40">Score</p>
              <p id="score" class="mt-2 text-3xl font-black text-neonCyan">0</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-white/5 p-5">
              <p class="text-xs font-black uppercase tracking-[.22em] text-white/40">Lines</p>
              <p id="lines" class="mt-2 text-3xl font-black text-neonPink">0</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-white/5 p-5">
              <p class="text-xs font-black uppercase tracking-[.22em] text-white/40">Level</p>
              <p id="level" class="mt-2 text-3xl font-black text-neonViolet">1</p>
            </div>
          </div>
        </div>

        <div class="glass rounded-[2rem] p-6">
          <h2 class="text-2xl font-black">Next</h2>
          <canvas id="next" width="120" height="120" class="mt-4 rounded-2xl border border-white/10 bg-black/30"></canvas>
        </div>

        <div class="glass rounded-[2rem] p-6">
          <div class="flex flex-wrap gap-3">
            <button id="startButton" class="glow-button rounded-full px-6 py-3 text-sm font-black uppercase tracking-[.16em] text-white transition hover:scale-105 active:scale-95">Start</button>
            <button id="pauseButton" class="rounded-full border border-white/15 bg-white/5 px-6 py-3 text-sm font-bold uppercase tracking-[.16em] text-white/80 transition hover:border-neonCyan/50 hover:bg-neonCyan/10 hover:text-white">Pause</button>
            <button id="restartButton" class="rounded-full border border-white/15 bg-white/5 px-6 py-3 text-sm font-bold uppercase tracking-[.16em] text-white/80 transition hover:border-neonPink/50 hover:bg-neonPink/10 hover:text-white">Restart</button>
          </div>

          <div class="mt-6 rounded-2xl border border-white/10 bg-white/5 p-5 text-sm leading-7 text-white/65">
            <p class="font-black text-white">Keyboard:</p>
            <p>← / → move, ↓ soft drop, ↑ rotate, Space hard drop, P pause.</p>
          </div>

          <div class="mt-6 grid grid-cols-3 gap-3 sm:max-w-sm">
            <div></div>
            <button class="touch-button rounded-2xl border border-white/10 bg-white/10 p-4 text-xl font-black" data-action="rotate">↻</button>
            <div></div>
            <button class="touch-button rounded-2xl border border-white/10 bg-white/10 p-4 text-xl font-black" data-action="left">←</button>
            <button class="touch-button rounded-2xl border border-white/10 bg-white/10 p-4 text-xl font-black" data-action="down">↓</button>
            <button class="touch-button rounded-2xl border border-white/10 bg-white/10 p-4 text-xl font-black" data-action="right">→</button>
            <div></div>
            <button class="touch-button rounded-2xl border border-pink-300/20 bg-pink-300/10 p-4 text-sm font-black uppercase tracking-[.12em] text-neonPink" data-action="drop">Drop</button>
            <div></div>
          </div>

          <p id="status" class="mt-6 rounded-2xl border border-cyan-300/20 bg-cyan-300/10 p-4 text-sm font-bold text-neonCyan">Press Start to play.</p>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("board");
    const context = canvas.getContext("2d");
    const nextCanvas = document.getElementById("next");
    const nextContext = nextCanvas.getContext("2d");

    const scoreElement = document.getElementById("score");
    const linesElement = document.getElementById("lines");
    const levelElement = document.getElementById("level");
    const statusElement = document.getElementById("status");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const COLORS = {
      I: "#42F8FF",
      J: "#4F7DFF",
      L: "#FFB84F",
      O: "#F9FF4F",
      S: "#55FF8A",
      T: "#B15CFF",
      Z: "#FF4F7D"
    };

    const PIECES = {
      I: [[1, 1, 1, 1]],
      J: [[1, 0, 0], [1, 1, 1]],
      L: [[0, 0, 1], [1, 1, 1]],
      O: [[1, 1], [1, 1]],
      S: [[0, 1, 1], [1, 1, 0]],
      T: [[0, 1, 0], [1, 1, 1]],
      Z: [[1, 1, 0], [0, 1, 1]]
    };

    let board;
    let current;
    let next;
    let score = 0;
    let lines = 0;
    let level = 1;
    let dropCounter = 0;
    let dropInterval = 850;
    let lastTime = 0;
    let running = false;
    let paused = false;
    let gameOver = false;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function randomPiece() {
      const types = Object.keys(PIECES);
      const type = types[Math.floor(Math.random() * types.length)];
      return {
        type,
        matrix: PIECES[type].map(row => [...row]),
        x: Math.floor(COLS / 2) - Math.ceil(PIECES[type][0].length / 2),
        y: 0
      };
    }

    function drawCell(ctx, x, y, color, size = BLOCK) {
      ctx.fillStyle = color;
      ctx.fillRect(x * size, y * size, size, size);
      ctx.strokeStyle = "rgba(255,255,255,.35)";
      ctx.lineWidth = 2;
      ctx.strokeRect(x * size + 1, y * size + 1, size - 2, size - 2);
      ctx.shadowColor = color;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = color;
      ctx.strokeRect(x * size + 4, y * size + 4, size - 8, size - 8);
      ctx.shadowBlur = 0;
    }

    function drawGrid() {
      context.strokeStyle = "rgba(255,255,255,.06)";
      context.lineWidth = 1;
      for (let x = 0; x <= COLS; x++) {
        context.beginPath();
        context.moveTo(x * BLOCK, 0);
        context.lineTo(x * BLOCK, canvas.height);
        context.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        context.beginPath();
        context.moveTo(0, y * BLOCK);
        context.lineTo(canvas.width, y * BLOCK);
        context.stroke();
      }
    }

    function drawMatrix(ctx, matrix, offsetX, offsetY, type, size = BLOCK) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) drawCell(ctx, x + offsetX, y + offsetY, COLORS[type], size);
        });
      });
    }

    function draw() {
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.fillStyle = "rgba(0,0,0,.35)";
      context.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      board.forEach((row, y) => {
        row.forEach((type, x) => {
          if (type) drawCell(context, x, y, COLORS[type]);
        });
      });

      if (current) drawMatrix(context, current.matrix, current.x, current.y, current.type);

      if (gameOver) {
        context.fillStyle = "rgba(0,0,0,.72)";
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = "#FF4FD8";
        context.font = "900 36px system-ui";
        context.textAlign = "center";
        context.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
        context.font = "700 16px system-ui";
        context.fillStyle = "#ffffff";
        context.fillText("Press Restart", canvas.width / 2, canvas.height / 2 + 26);
      }

      drawNext();
    }

    function drawNext() {
      nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextContext.fillStyle = "rgba(0,0,0,.35)";
      nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      if (!next) return;
      const size = 24;
      const matrixWidth = next.matrix[0].length;
      const matrixHeight = next.matrix.length;
      const offsetX = Math.floor((nextCanvas.width / size - matrixWidth) / 2);
      const offsetY = Math.floor((nextCanvas.height / size - matrixHeight) / 2);
      drawMatrix(nextContext, next.matrix, offsetX, offsetY, next.type, size);
    }

    function collide(piece) {
      const matrix = piece.matrix;
      for (let y = 0; y < matrix.length; y++) {
        for (let x = 0; x < matrix[y].length; x++) {
          if (!matrix[y][x]) continue;
          const boardX = piece.x + x;
          const boardY = piece.y + y;
          if (boardX < 0 || boardX >= COLS || boardY >= ROWS) return true;
          if (boardY >= 0 && board[boardY][boardX]) return true;
        }
      }
      return false;
    }

    function merge(piece) {
      piece.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) board[piece.y + y][piece.x + x] = piece.type;
        });
      });
    }

    function clearLines() {
      let cleared = 0;
      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) {
          if (!board[y][x]) continue outer;
        }
        board.splice(y, 1);
        board.unshift(Array(COLS).fill(null));
        cleared++;
        y++;
      }

      if (cleared > 0) {
        const points = [0, 100, 300, 500, 800][cleared] * level;
        score += points;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(120, 850 - (level - 1) * 70);
        updateStats();
      }
    }

    function rotateMatrix(matrix) {
      return matrix[0].map((_, index) => matrix.map(row => row[index]).reverse());
    }

    function rotatePiece() {
      if (!current || paused || gameOver) return;
      const original = current.matrix;
      current.matrix = rotateMatrix(current.matrix);
      let offset = 1;
      while (collide(current)) {
        current.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (Math.abs(offset) > current.matrix[0].length + 1) {
          current.matrix = original;
          return;
        }
      }
      draw();
    }

    function movePiece(direction) {
      if (!current || paused || gameOver) return;
      current.x += direction;
      if (collide(current)) current.x -= direction;
      draw();
    }

    function dropPiece() {
      if (!current || paused || gameOver) return;
      current.y++;
      if (collide(current)) {
        current.y--;
        merge(current);
        clearLines();
        spawnPiece();
      }
      dropCounter = 0;
      draw();
    }

    function hardDrop() {
      if (!current || paused || gameOver) return;
      while (!collide(current)) current.y++;
      current.y--;
      merge(current);
      score += 2;
      clearLines();
      spawnPiece();
      updateStats();
      draw();
    }

    function spawnPiece() {
      current = next || randomPiece();
      next = randomPiece();
      if (collide(current)) {
        gameOver = true;
        running = false;
        statusElement.textContent = "Game over. Press Restart.";
      }
    }

    function updateStats() {
      scoreElement.textContent = score;
      linesElement.textContent = lines;
      levelElement.textContent = level;
    }

    function resetGame() {
      board = createBoard();
      current = randomPiece();
      next = randomPiece();
      score = 0;
      lines = 0;
      level = 1;
      dropCounter = 0;
      dropInterval = 850;
      lastTime = 0;
      running = true;
      paused = false;
      gameOver = false;
      statusElement.textContent = "Game running.";
      updateStats();
      draw();
      requestAnimationFrame(update);
    }

    function update(time = 0) {
      if (!running) return;
      const delta = time - lastTime;
      lastTime = time;

      if (!paused && !gameOver) {
        dropCounter += delta;
        if (dropCounter > dropInterval) dropPiece();
      }

      draw();
      requestAnimationFrame(update);
    }

    function togglePause() {
      if (!running || gameOver) return;
      paused = !paused;
      statusElement.textContent = paused ? "Paused." : "Game running.";
      draw();
    }

    document.getElementById("startButton").addEventListener("click", () => {
      if (!running) resetGame();
    });

    document.getElementById("pauseButton").addEventListener("click", togglePause);
    document.getElementById("restartButton").addEventListener("click", resetGame);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") movePiece(-1);
      if (event.key === "ArrowRight") movePiece(1);
      if (event.key === "ArrowDown") dropPiece();
      if (event.key === "ArrowUp") rotatePiece();
      if (event.code === "Space") {
        event.preventDefault();
        hardDrop();
      }
      if (event.key.toLowerCase() === "p") togglePause();
    });

    document.querySelectorAll(".touch-button").forEach(button => {
      button.addEventListener("click", () => {
        const action = button.dataset.action;
        if (action === "left") movePiece(-1);
        if (action === "right") movePiece(1);
        if (action === "down") dropPiece();
        if (action === "rotate") rotatePiece();
        if (action === "drop") hardDrop();
      });
    });

    board = createBoard();
    current = randomPiece();
    next = randomPiece();
    updateStats();
    draw();
  </script>
</body>
</html>
